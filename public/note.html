<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>burnote — Geheime Nachricht lesen</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#0f0f13] text-[#e2e2e2] font-sans p-6">
  <div class="w-full max-w-xl bg-[#1a1a24] border border-[#2a2a38] rounded-xl p-8">
    <h1 class="text-xl font-semibold mb-1">Geheime Nachricht</h1>
    <p class="text-sm text-gray-500 mb-6">Diese Nachricht wurde für dich verschlüsselt und ist jetzt zerstört.</p>

    <div id="loadingState" class="hidden text-sm text-gray-400">Überprüfe Nachricht …</div>

    <button
      id="revealBtn"
      class="hidden mx-auto block py-3 px-8 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg text-sm transition-colors"
    >
      Nachricht öffnen
    </button>

    <div id="messageBox" class="hidden mt-4 bg-[#111118] border border-[#2a2a38] rounded-lg p-4 whitespace-pre-wrap break-words text-sm leading-relaxed"></div>

    <p id="destroyedNote" class="hidden mt-3 text-xs text-amber-400">
      Diese Nachricht existiert nicht mehr auf dem Server.
    </p>

    <div id="errorBox" class="hidden mt-4 p-4 bg-[#1f1015] border border-[#5a2030] rounded-lg text-[#e06070] text-sm"></div>

    <a href="/" class="inline-block mt-6 text-sm text-indigo-400 hover:underline">Neue Nachricht erstellen</a>
  </div>

  <script type="module" src="/js/note.js"></script>
</body>
</html>
