<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privnote — Geheime Nachricht lesen</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#0f0f13] text-[#e2e2e2] font-sans p-6">
  <div class="w-full max-w-xl bg-[#1a1a24] border border-[#2a2a38] rounded-xl p-8">
    <h1 class="text-xl font-semibold mb-1">Geheime Nachricht</h1>
    <p class="text-sm text-gray-500 mb-6">Diese Nachricht wurde für dich verschlüsselt und ist jetzt zerstört.</p>

    <div id="loadingState" class="hidden text-sm text-gray-400">Überprüfe Nachricht …</div>

    <button
      id="revealBtn"
      onclick="revealNote()"
      class="hidden mx-auto block py-3 px-8 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg text-sm transition-colors"
    >
      Nachricht öffnen
    </button>

    <div id="messageBox" class="hidden mt-4 bg-[#111118] border border-[#2a2a38] rounded-lg p-4 whitespace-pre-wrap break-words text-sm leading-relaxed"></div>

    <p id="destroyedNote" class="hidden mt-3 text-xs text-amber-400">
      Diese Nachricht existiert nicht mehr auf dem Server.
    </p>

    <div id="errorBox" class="hidden mt-4 p-4 bg-[#1f1015] border border-[#5a2030] rounded-lg text-[#e06070] text-sm"></div>

    <a href="/" class="inline-block mt-6 text-sm text-indigo-400 hover:underline">Neue Nachricht erstellen</a>
  </div>

  <script>
    const fromBase64url = str => {
      const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
      const pad = b64 + '='.repeat((4 - b64.length % 4) % 4);
      return Uint8Array.from(atob(pad), c => c.charCodeAt(0));
    };

    function showError(msg) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('revealBtn').classList.add('hidden');
      const el = document.getElementById('errorBox');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    async function revealNote() {
      document.getElementById('revealBtn').classList.add('hidden');
      document.getElementById('loadingState').classList.remove('hidden');

      const fragment = location.hash.slice(1);
      const parts = fragment.split('.');
      if (parts.length !== 3) return showError('Ungültiges Link-Format.');
      const [id, keyB64, ivB64] = parts;

      let ciphertextB64;
      try {
        const res = await fetch(`/api/notes/${id}`);
        if (!res.ok) return showError('Nachricht nicht gefunden oder wurde bereits gelesen.');
        ({ ciphertext: ciphertextB64 } = await res.json());
      } catch {
        return showError('Netzwerkfehler beim Abrufen der Nachricht.');
      }

      try {
        const key = await crypto.subtle.importKey(
          'raw', fromBase64url(keyB64), { name: 'AES-GCM' }, false, ['decrypt']
        );
        const decrypted = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: fromBase64url(ivB64) }, key, fromBase64url(ciphertextB64)
        );

        document.getElementById('loadingState').classList.add('hidden');
        const box = document.getElementById('messageBox');
        box.textContent = new TextDecoder().decode(decrypted);
        box.classList.remove('hidden');
        document.getElementById('destroyedNote').classList.remove('hidden');
      } catch {
        showError('Entschlüsselung fehlgeschlagen — der Link könnte beschädigt sein.');
      }
    }

    async function init() {
      const fragment = location.hash.slice(1);
      if (!fragment) return showError('Ungültiger Link — kein Schlüssel im Fragment.');

      const parts = fragment.split('.');
      if (parts.length !== 3) return showError('Ungültiges Link-Format.');
      const [id] = parts;

      document.getElementById('loadingState').classList.remove('hidden');
      try {
        const res = await fetch(`/api/notes/${id}`, { method: 'HEAD' });
        document.getElementById('loadingState').classList.add('hidden');
        if (!res.ok) return showError('Nachricht wurde nicht gefunden.');
        document.getElementById('revealBtn').classList.remove('hidden');
      } catch {
        showError('Netzwerkfehler beim Überprüfen der Nachricht.');
      }
    }

    init();
  </script>
</body>
</html>
