<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureDrop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <script>
    const t = localStorage.getItem('theme');
    const d = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.classList.toggle('dark', d);
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    :root {
      --bg-page:    #f0f4f8;
      --bg-card:    #ffffff;
      --bg-input:   #f8fafc;
      --bg-2nd:     #e2e8f0;
      --bg-2nd-h:   #cbd5e1;
      --border:     #e2e8f0;
      --text:       #0f172a;
      --text-muted: #64748b;
      --text-code:  #0284c7;
      --card-shadow: 0 0 0 1px rgba(0,0,0,.06), 0 24px 64px rgba(0,0,0,.08);
      --header-bg:  rgba(240,244,248,.8);
      --header-border: #e2e8f0;
    }
    html.dark {
      --bg-page:    #020817;
      --bg-card:    #0b1120;
      --bg-input:   #030d1a;
      --bg-2nd:     #1e293b;
      --bg-2nd-h:   #273549;
      --border:     #1e293b;
      --text:       #e2e8f0;
      --text-muted: #64748b;
      --text-code:  #22d3ee;
      --card-shadow: 0 0 0 1px rgba(6,182,212,.08), 0 24px 64px rgba(0,0,0,.6);
      --header-bg:  rgba(2,8,23,.8);
      --header-border: #1e293b;
    }

    body { background: var(--bg-page); color: var(--text); transition: background .2s, color .2s; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
      transition: background .2s, border-color .2s, box-shadow .2s;
    }
    .input-field {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      transition: background .2s, border-color .2s;
    }
    .input-field:focus { box-shadow: 0 0 0 2px rgba(6,182,212,.3); outline: none; }
    .btn-secondary {
      background: var(--bg-2nd);
      color: var(--text);
      transition: background .2s;
    }
    .btn-secondary:hover { background: var(--bg-2nd-h); }
    .text-muted { color: var(--text-muted); }
    .text-code { color: var(--text-code); }
    .border-theme { border-color: var(--border); }
    .link-box { background: var(--bg-input); border: 1px solid var(--border); box-shadow: inset 0 2px 8px rgba(0,0,0,.15); }
    .badge-secure { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.2); }

    .site-header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      backdrop-filter: blur(12px);
      transition: background .2s, border-color .2s;
    }
    .theme-btn {
      background: var(--bg-2nd);
      color: var(--text-muted);
      transition: background .2s, color .2s;
    }
    .theme-btn:hover { background: var(--bg-2nd-h); color: var(--text); }

    .btn-primary {
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      box-shadow: 0 0 24px rgba(6,182,212,.25);
      transition: box-shadow .2s, transform .15s;
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 0 36px rgba(6,182,212,.45); transform: translateY(-1px); }
    .btn-primary:disabled { background: var(--bg-2nd); box-shadow: none; cursor: not-allowed; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn .35s ease forwards; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="site-header sticky top-0 z-10 w-full">
    <div class="max-w-screen-lg mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <img src="/logo.svg" alt="SecureDrop" class="w-7 h-7" />
        <span class="mono text-sm font-medium">SecureDrop</span>
      </div>
      <button id="themeToggle" class="theme-btn w-9 h-9 flex items-center justify-center rounded-lg" title="Theme wechseln"></button>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 flex flex-col items-center justify-center p-3 sm:p-6">
    <div class="w-full max-w-lg card rounded-xl sm:rounded-2xl p-5 sm:p-8">

      <h1 class="text-xl font-semibold mb-1">Geheime Nachricht</h1>
      <p class="text-muted text-sm mb-5">End-to-end verschlüsselt · Einmalig lesbar · Danach vernichtet</p>

      <span class="badge-secure inline-flex items-center gap-1.5 text-emerald-500 text-xs mono px-2.5 py-1 rounded-full mb-6">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
        AES-256-GCM · Zero-knowledge
      </span>

      <div class="relative">
        <textarea
          id="message"
          placeholder="Nachricht eingeben …"
          class="input-field w-full min-h-36 rounded-xl text-sm p-4 resize-y placeholder:text-slate-500 leading-relaxed"
        ></textarea>
        <span class="absolute bottom-3 right-3 text-muted text-xs mono" id="charCount">0</span>
      </div>

      <button id="createBtn" class="btn-primary mt-4 w-full py-3 text-white font-semibold rounded-xl text-sm">
        Link generieren
      </button>

      <div id="result" class="hidden fade-in mt-6">
        <div class="flex items-center gap-2 mb-3">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span class="text-emerald-500 text-xs font-medium">Link erstellt — funktioniert nur einmal</span>
        </div>
        <div class="link-box rounded-xl p-3 flex flex-col sm:flex-row gap-2">
          <input id="link" type="text" readonly class="flex-1 bg-transparent text-code mono text-xs outline-none truncate min-w-0" />
          <button id="copyBtn" class="btn-secondary w-full sm:w-auto shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium">Kopieren</button>
        </div>
        <p class="mt-3 text-amber-500 text-xs mono flex items-center gap-1.5">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Nachricht wird nach erstem Öffnen permanent gelöscht
        </p>
      </div>
    </div>

    <p class="mt-5 text-muted text-xs mono">Der Schlüssel verlässt nie deinen Browser.</p>
  </main>

  <script type="module" src="/js/theme.js"></script>
  <script type="module" src="/js/create.js"></script>
</body>
</html>
