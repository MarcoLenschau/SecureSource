<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>deadrop — Encrypted One-Time Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    .card-glow {
      box-shadow: 0 0 0 1px rgba(6,182,212,.08), 0 24px 64px rgba(0,0,0,.6);
    }

    .btn-primary {
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      box-shadow: 0 0 24px rgba(6,182,212,.25);
      transition: box-shadow .2s, transform .15s;
    }
    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 0 36px rgba(6,182,212,.45);
      transform: translateY(-1px);
    }
    .btn-primary:disabled { background: #1e3a4a; box-shadow: none; cursor: not-allowed; }

    textarea:focus { box-shadow: 0 0 0 2px rgba(6,182,212,.3); }

    .link-box {
      background: #020817;
      border: 1px solid #1e293b;
      box-shadow: inset 0 2px 8px rgba(0,0,0,.4);
    }

    .badge {
      background: rgba(16,185,129,.1);
      border: 1px solid rgba(16,185,129,.2);
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn .35s ease forwards; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-[#020817] text-slate-200 p-6">

  <div class="w-full max-w-lg card-glow bg-[#0b1120] border border-[#1e293b] rounded-2xl p-8">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-1">
      <div class="w-8 h-8 rounded-lg bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <span class="mono text-lg font-medium tracking-tight text-white">deadrop</span>
    </div>

    <p class="text-slate-500 text-sm mb-5 ml-11">End-to-end verschlüsselt · Einmalig lesbar · Danach vernichtet</p>

    <span class="badge inline-flex items-center gap-1.5 text-emerald-400 text-xs mono px-2.5 py-1 rounded-full mb-6">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
      AES-256-GCM · Zero-knowledge
    </span>

    <!-- Input -->
    <div class="relative">
      <textarea
        id="message"
        placeholder="Nachricht eingeben …"
        class="w-full min-h-36 bg-[#030d1a] border border-[#1e293b] rounded-xl text-slate-200 text-sm p-4 resize-y outline-none transition-shadow placeholder:text-slate-600 leading-relaxed"
      ></textarea>
      <span class="absolute bottom-3 right-3 text-slate-600 text-xs mono" id="charCount">0</span>
    </div>

    <button
      id="createBtn"
      class="btn-primary mt-4 w-full py-3 text-white font-semibold rounded-xl text-sm"
    >
      Link generieren
    </button>

    <!-- Result -->
    <div id="result" class="hidden fade-in mt-6">
      <div class="flex items-center gap-2 mb-3">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span class="text-emerald-400 text-xs font-medium">Link erstellt — funktioniert nur einmal</span>
      </div>

      <div class="link-box rounded-xl p-3 flex gap-2 items-center">
        <input
          id="link"
          type="text"
          readonly
          class="flex-1 bg-transparent text-cyan-400 mono text-xs outline-none truncate"
        />
        <button
          id="copyBtn"
          class="shrink-0 px-3 py-1.5 bg-[#1e293b] hover:bg-[#273549] text-slate-300 rounded-lg text-xs transition-colors"
        >
          Kopieren
        </button>
      </div>

      <p class="mt-3 text-amber-500/80 text-xs mono flex items-center gap-1.5">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Nachricht wird nach erstem Öffnen permanent gelöscht
      </p>
    </div>
  </div>

  <p class="mt-6 text-slate-600 text-xs mono">Der Schlüssel verlässt nie deinen Browser.</p>

  <script type="module" src="/js/create.js"></script>
</body>
</html>
