<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="shieldFill" x1="32" y1="5" x2="32" y2="59" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#112240"/>
      <stop offset="100%" stop-color="#060e1f"/>
    </linearGradient>
    <linearGradient id="lockFill" x1="21" y1="31" x2="43" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="shackleStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="lockGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shieldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <path
    d="M32 5 C26 5 11 9.5 11 14.5 L11 33 C11 45.5 20 55 32 59 C44 55 53 45.5 53 33 L53 14.5 C53 9.5 38 5 32 5 Z"
    fill="url(#shieldFill)"
    filter="url(#shieldGlow)"
  />

  <!-- Shield border -->
  <path
    d="M32 5 C26 5 11 9.5 11 14.5 L11 33 C11 45.5 20 55 32 59 C44 55 53 45.5 53 33 L53 14.5 C53 9.5 38 5 32 5 Z"
    stroke="#06b6d4"
    stroke-width="1.5"
    stroke-opacity="0.9"
  />

  <!-- Inner shield highlight -->
  <path
    d="M32 9 C27 9 15 12.5 15 17 L15 33 C15 43 22.5 51 32 55"
    stroke="#06b6d4"
    stroke-width="0.75"
    stroke-opacity="0.15"
    stroke-linecap="round"
  />

  <!-- Lock shackle -->
  <path
    d="M25.5 31.5 L25.5 25.5 C25.5 19.5 38.5 19.5 38.5 25.5 L38.5 31.5"
    stroke="url(#shackleStroke)"
    stroke-width="2.5"
    stroke-linecap="round"
    filter="url(#lockGlow)"
  />

  <!-- Lock body -->
  <rect
    x="21" y="31" width="22" height="16" rx="3.5"
    fill="url(#lockFill)"
    filter="url(#lockGlow)"
  />

  <!-- Drop arrow -->
  <line x1="32" y1="35.5" x2="32" y2="42" stroke="#071a30" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="29,39.5 32,43 35,39.5" stroke="#071a30" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
