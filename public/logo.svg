<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1f3a"/>
      <stop offset="100%" stop-color="#071020"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path
    d="M32 4 L54 13 V33 C54 46 44 55 32 60 C20 55 10 46 10 33 V13 Z"
    fill="url(#shieldGrad)"
    stroke="#06b6d4"
    stroke-width="1.5"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Shield inner highlight line -->
  <path
    d="M32 9 L50 17 V33 C50 44 41 52 32 56"
    fill="none"
    stroke="#06b6d4"
    stroke-width="0.5"
    stroke-opacity="0.2"
    stroke-linejoin="round"
  />

  <!-- Lock body -->
  <rect x="21" y="32" width="22" height="16" rx="3.5" fill="url(#lockGrad)" filter="url(#subtleGlow)"/>

  <!-- Lock shackle -->
  <path
    d="M26 32 V27 C26 21 38 21 38 27 V32"
    stroke="url(#lockGrad)"
    stroke-width="3"
    stroke-linecap="round"
    filter="url(#subtleGlow)"
  />

  <!-- Down arrow (drop) inside lock -->
  <path
    d="M32 36 V44"
    stroke="#020817"
    stroke-width="2.2"
    stroke-linecap="round"
  />
  <path
    d="M28.5 41 L32 44.5 L35.5 41"
    stroke="#020817"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
